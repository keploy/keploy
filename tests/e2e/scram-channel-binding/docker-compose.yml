# End-to-end test for keploy's SCRAM channel binding workaround.
#
# Three services exercise the full round-trip:
#
#   postgres : Stock postgres:16 image, configured to REQUIRE
#              hostssl + scram-sha-256 (which gives clients
#              SCRAM-SHA-256-PLUS over TLS).
#
#   mitm     : Tiny Go program that does what keploy's
#              dialPostgresSSLUpstream does: terminates app-side
#              TLS with its own cert, opens upstream TLS to
#              postgres, captures the real cert, publishes the
#              (H_mitm, H_real) pair via the actual cbmap.Publish
#              from the keploy module. cbmap.txt lands on a shared
#              volume the app can read.
#
#   app      : Debian + libpq client + the LD_PRELOAD shim
#              compiled from pkg/agent/proxy/tls/asset/cbshim.c.
#              The entrypoint runs three assertions:
#                phase 1 — no shim → must FATAL
#                phase 2 — shim + prefer → must succeed
#                phase 3 — shim + require → must succeed
#
# Run via ./run.sh — it builds the three images, brings up the
# stack, waits for the app container to exit, and asserts exit 0.

services:
  postgres:
    build: { context: ./postgres }
    image: e2e-scram-cb-postgres:local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h /var/run/postgresql"]
      interval: 1s
      timeout: 3s
      retries: 30
    environment:
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: testdb
    networks: [scram_cb_net]

  mitm:
    build:
      # Build context is the keploy repo root so we can COPY the
      # cbmap package into the Go module.
      context: ../../..
      dockerfile: tests/e2e/scram-channel-binding/mitm/Dockerfile
    image: e2e-scram-cb-mitm:local
    depends_on:
      postgres: { condition: service_healthy }
    command:
      - "-listen=:5432"
      - "-upstream=postgres:5432"
      - "-cert=/certs/mitm.crt"
      - "-key=/certs/mitm.key"
    environment:
      KEPLOY_CBMAP_PATH: /keploy-tls/cbmap.txt
    volumes:
      - ./mitm/mitm.crt:/certs/mitm.crt:ro
      - ./mitm/mitm.key:/certs/mitm.key:ro
      - keploy_tls:/keploy-tls
    networks: [scram_cb_net]

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: e2e-scram-cb-app:local
    depends_on:
      mitm: { condition: service_started }
      postgres: { condition: service_healthy }
    volumes:
      - keploy_tls:/keploy-tls:ro
    networks: [scram_cb_net]

volumes:
  # Shared EmptyDir-equivalent. mitm writes cbmap.txt here, app
  # reads it via the shim.
  keploy_tls: {}

networks:
  scram_cb_net: {}
