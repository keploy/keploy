# PIPELINE 1: Pull Request Validation

**Trigger:** On Pull Request creation or update against the default branch.
**Purpose:** Fast validation of code changes using existing sandboxes.

**Steps to implement:**

1. Checkout the repository.
2. Setup runtime/toolchain using ONLY `keploy_dependency_start` evaluated output (`runtime_setup_commands`).
3. Install minimal dependencies using ONLY `minimal_deps_install_commands` from `keploy_dependency_start`.
4. Install Keploy using EXACTLY this command:
   `curl --silent -O -L https://keploy.io/install.sh && source install.sh`
5. Run Replay Validation:
   `keploy sandbox replay -c "{{test_command}}"`
6. Requirement: The pipeline MUST fail immediately if the replay step fails.

