# PIPELINE 2: Default Branch Push & Conditional Recording

**Trigger:** On push to the default branch.
**Purpose:** Conditional recording. Only create new sandboxes if existing ones fail validation.
**Critical Requirement:** You MUST include logic to prevent an infinite CI loop. The workflow must gracefully exit or skip if the commit was made by the CI bot.

**Steps to implement:**

1. Checkout the repository.
2. Setup runtime/toolchain using ONLY `runtime_setup_commands` from `keploy_dependency_start`.
3. Install Keploy:
   `curl --silent -O -L https://keploy.io/install.sh && source install.sh`

---

## Phase A: Try Replay First (Idempotency Check)

1. Install minimal dependencies using ONLY `minimal_deps_install_commands`.
2. Run:
   `keploy sandbox replay -c "{{test_command}}"`
3. If Replay PASSES ✅: exit job successfully (do not record, do not commit).
4. If Replay FAILS ❌: capture the failure without failing the job, and proceed immediately to Phase B (platform-specific "continue on error" ONLY for this replay step).

---

## Phase B: Record & Update (Runs ONLY if Phase A fails)

1. Install full dependencies using ONLY `full_deps_install_commands` from `keploy_dependency_start`.

2. Increment Tag:

   * Read `sandbox.ref` from `keploy.yml` or `keploy.yaml`
   * Extract `<company>/<app>:vX.Y.Z`
   * Bump PATCH only (`vX.Y.Z` → `vX.Y.(Z+1)`)
   * Store as `NEW_TAG`
   * Must preserve company/app prefix exactly.
   * Must validate it is SemVer with leading `v`. If invalid/missing, fail with a clear error.

   Format:

   ```
   sandbox:
     ref: <company_name>/<app_name>:<tag>
   ```

3. Record:
   `keploy sandbox record -c "{{test_command}}" --tag "$NEW_TAG"`

4. Verify (Replay & Upload):
   `keploy sandbox replay -c "{{test_command}}"`

   * Crucial: If this verification replay fails, STOP the pipeline immediately ❌. Do not commit.

5. Update & Push (only if verification passes):

   1. Stage the modified Keploy config file (`keploy.yml` or `keploy.yaml`) updated by Keploy record (sandbox.ref bump).
   2. Configure the Git bot user (or similar).
   3. Commit with message like:
      `chore: bump sandbox version to $NEW_TAG`
      Also ensure it doesn't retrigger this pipeline:

      * include platform-specific skip token if supported
      * AND job-level skip when commit author/actor is the CI bot
   4. Push the commit to the default branch.

