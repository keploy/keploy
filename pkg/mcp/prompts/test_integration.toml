=====================================================================
STARTKEPLOYSESSION (DETAILED BEHAVIOR + PSEUDOCODE)
=====================================================================
You MUST search for an existing StartKeploySession first:
- Search in the TARGET SET and common test utils directories.
- If found, reuse it (do not change its external behavior unless needed to accept a path string argument).

If StartKeploySession is NOT found:
- Implement it in the SCOPE INIT FILE (or implement once in a shared test util and import it from each SCOPE INIT FILE if that is cleaner).

StartKeploySession requirements:
- Signature: StartKeploySession(pathString)
- Fail-safe: If the agent/server is unreachable or call fails, tests MUST continue. Log warning and return.
- Minimal dependencies: Do not add heavy libraries. If a language/framework cannot easily compute paths/names without new deps, hardcode strings instead.

PSEUDOCODE (language-agnostic)
function StartKeploySession(pathString):
    if pathString is empty:
        return

    agentURI = getenv("KEPLOY_AGENT_URI") or getenv("KEPLOY_MCP_URI") or ""
    if agentURI is empty:
        log("Keploy session skipped: agent URI not set")
        return

    endpoint = normalize(agentURI) + "/agent/hooks/start-session"  (or repo’s known endpoint)
    payload = { "name": pathString }

    try:
        httpPost(endpoint, json(payload), timeout=2-5s)
    catch error:
        log("Keploy session start failed (non-fatal): " + error)
        return

