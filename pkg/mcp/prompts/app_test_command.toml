STEP 2 — PICK THE “APPLICATION TEST COMMAND” (PREFER OUTGOING CALLS)
=====================================================================
From the candidates, choose ONE command that best matches these priorities:

Priority 1: Outgoing-call / integration behavior
Pick commands that are clearly integration/e2e/functional/API tests, e.g.:
- script names: *integration*, *e2e*, *functional*, *api*, *contract*
- directories: tests/integration, test/e2e, integrationTest, e2e/, api-tests/
