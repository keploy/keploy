If multiple integration commands exist, prefer the one used in CI.

Priority 3: Minimal prerequisites
Prefer the command that likely runs without special manual steps, BUT still prefer outgoing-call tests over unit tests.

If the repo has ONLY unit tests, choose the default test command used by CI (still serialize it).

