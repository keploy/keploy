=====================================================================
STEP 4 — FORCE SERIAL EXECUTION (NO PARALLELISM ANYWHERE)
=====================================================================
You must remove/override parallelism at 3 levels: modules/packages, files, tests.
Apply the correct strategy based on the runner you detected.

------------------------------------------------------------
A) GO (go test)
------------------------------------------------------------
Goal: no parallel packages, no parallel tests
Use:
- `-p 1`   => packages sequential
- `-parallel 1` => disables t.Parallel concurrency (only 1 allowed)
Strong serial command shape:
  go test -p 1 -parallel 1 ./...

If repo uses tags/race/run/count/timeout, preserve them and still add `-p 1 -parallel 1`.

------------------------------------------------------------
B) PYTHON
------------------------------------------------------------
If using pytest:
- Pytest is serial by default, but parallelism may be enabled via pytest-xdist (-n).
You must neutralize it if the repo references xdist in config/deps/CI.
Preferred:
- If config/deps indicate xdist is used: add `-n0` to force single worker.
Also preserve existing selectors: paths, -m markers, -k expressions, etc.
Serial command shape:
  pytest -n0 <existing args...>
If xdist is not present and not used, do NOT add -n0 (avoid errors).

If using unittest:
- `python -m unittest` is already serial. Preserve discovered pattern/paths.

------------------------------------------------------------
C) JS/TS (choose based on what the repo actually uses)
------------------------------------------------------------

If Jest:
- Disable worker processes across files: `--runInBand`
- Disable concurrent tests within files: `--maxConcurrency=1`
Serial command shape:
  jest --runInBand --maxConcurrency=1 <existing args...>
(or `npx jest ...` / `pnpm jest ...` depending on repo)

If Vitest:
- Disable file parallelism: `--no-file-parallel`
- Disable concurrent tests: `--sequence.concurrent=false`
Serial command shape:
  vitest run --no-file-parallel --sequence.concurrent=false <existing args...>

If Mocha:
- Mocha is serial by default unless parallel mode is enabled in config.
- If repo/config uses parallel mode, override it using the CLI negation if supported by that setup:
  mocha --no-parallel <existing args...>
If you cannot confirm a negation flag is supported, prefer invoking mocha without any parallel enabling flags and avoid configs that force parallel (by selecting the wrapper/command variant that runs serially).

If Playwright:
- Disable workers: `--workers=1`
- If command already sets workers, override to 1.
Serial command shape:
  playwright test --workers=1 <existing args...>
(or `npx playwright test ...`)

If Node’s built-in test runner (`node --test`):
- Ensure single thread/worker if options exist in that repo setup; otherwise prefer a different runner if available.

------------------------------------------------------------
D) JAVA (choose Maven or Gradle based on repo)
------------------------------------------------------------

If Maven (`mvn` or `./mvnw`):
You must disable:
- module/build parallelism
- test engine parallelism
- fork parallelism

Use:
- `-T 1` => single-threaded build/modules
- Force single fork: commonly `-DforkCount=1`
- Disable JUnit 5 parallel engine if present:
  `-Djunit.jupiter.execution.parallel.enabled=false`

Serial command shape (merge with existing goals/profiles):
  mvn -T 1 test -DforkCount=1 -Djunit.jupiter.execution.parallel.enabled=false <existing args...>
(or `./mvnw -T 1 test ...`)

If Gradle (`./gradlew`):
Disable:
- project parallel: `--no-parallel`
- worker threads: `--max-workers=1`
- disable JUnit5 parallel engine if relevant:
  `-Djunit.jupiter.execution.parallel.enabled=false`

Serial command shape:
  ./gradlew test --no-parallel --max-workers=1 -Djunit.jupiter.execution.parallel.enabled=false <existing args...>

If repo clearly uses TestNG parallel features, also add the strongest available CLI/system props to disable it IF you see it in configs; otherwise leave it.

