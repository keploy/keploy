name: Keploy Performance Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  performance-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: petclinic
          MYSQL_DATABASE: petclinic
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout Keploy (yaml-optimization branch)
        uses: actions/checkout@v4
        with:
          path: keploy

      - name: Checkout Spring PetClinic
        uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          path: petclinic

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build Spring PetClinic
        working-directory: petclinic
        run: ./mvnw clean package -DskipTests

      - name: Start Spring PetClinic
        working-directory: petclinic
        run: |
          java -jar target/spring-petclinic-*.jar \
            --spring.datasource.url=jdbc:mysql://localhost:3306/petclinic \
            --spring.datasource.username=root \
            --spring.datasource.password=petclinic &
          echo $! > app.pid

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health 2>/dev/null; then
              echo "✅ Application is ready"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 2
          done
          echo "❌ Application failed to start"
          exit 1

      - name: Build Keploy
        working-directory: keploy
        run: |
          git fetch origin yaml-optimization
          git checkout yaml-optimization
          go build -o keploy main.go

      - name: Start Keploy in record mode
        working-directory: keploy
        run: |
          # Create test directory
          mkdir -p keploy-tests
          # Create load test script inline
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check } from 'k6';

          export const options = {
            scenarios: {
              constant_load: {
                executor: 'constant-arrival-rate',
                rate: 100,
                timeUnit: '1s',
                duration: '60s',
                preAllocatedVUs: 20,
                maxVUs: 100,
              },
            },
            thresholds: {
              http_reqs: ['rate>=100'],
              http_req_failed: ['rate<0.01'],
            },
          };

          export default function () {
            const res = http.get('http://localhost:8080/');
            check(res, {
              'status is 200': (r) => r.status === 200,
            });
          }
          EOF
          # Start Keploy wrapping k6 to intercept its traffic
          sudo -E env PATH=$PATH ./keploy record -c "k6 run --quiet load-test.js" --path=./keploy-tests --config-path=/tmp/keploy-no-config
