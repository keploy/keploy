# Postgres-only stack: starts a postgres instance with TLS + SCRAM-SHA-256
# forced via hostssl entries in pg_hba.conf. The Flask app runs natively
# under keploy record (not in compose) so keploy's proxy sees libpq's
# upstream connections from a process it owns.
#
# The app is started by python-linux.sh after this stack reports healthy.

services:
  postgres:
    build: ./postgres
    image: scram-channel-binding-pg:local
    environment:
      POSTGRES_PASSWORD: postgres-superuser-secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h /var/run/postgresql"]
      interval: 1s
      timeout: 3s
      retries: 30
