name: Trigger Flipkart Enterprise Release

on:
  push:
    tags:
      - 'flipkart-*'

jobs:
  trigger-release:
    name: Trigger Enterprise Release for Flipkart Tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate Flipkart tag name
        id: tag
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ ! "$RELEASE_TAG" =~ ^flipkart-[A-Za-z0-9][A-Za-z0-9-]*$ ]]; then
            echo "❌ Invalid Flipkart tag: $RELEASE_TAG"
            echo "   Expected format: flipkart-<name> using only letters, numbers, and hyphens."
            exit 1
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Validated Flipkart release tag: $RELEASE_TAG"

      - name: Trigger Woodpecker pipeline
        env:
          WOODPECKER_SERVER: ${{ secrets.WOODPECKER_SERVER }}
          WOODPECKER_TOKEN: ${{ secrets.WOODPECKER_TOKEN }}
          WOODPECKER_ENTERPRISE_REPO_ID: ${{ secrets.WOODPECKER_ENTERPRISE_REPO_ID }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          echo "Triggering Flipkart enterprise release pipeline..."
          echo "OSS tag: ${RELEASE_TAG}"
          echo "Tag commit: ${{ github.sha }}"

          PAYLOAD=$(cat <<INNEREOF
          {"branch": "ci/flipkart-release-pipeline", "variables": {"RELEASE_TARGET": "flipkart", "FLIPKART_RELEASE_TAG": "${RELEASE_TAG}"}}
          INNEREOF
          )

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${WOODPECKER_SERVER}/api/repos/${WOODPECKER_ENTERPRISE_REPO_ID}/pipelines" \
            -H "Authorization: Bearer ${WOODPECKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully (HTTP $HTTP_CODE)"
            echo "$BODY"
          else
            echo "Failed to trigger pipeline (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
