name: Trigger Flipkart Enterprise Release

on:
  push:
    branches:
      - flipkart

jobs:
  trigger-release:
    name: Trigger Enterprise Release for Flipkart
    if: contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Extract release suffix from commit message
        id: extract
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          # Extract the first word after 'release' (case-insensitive).
          # Can be a number or any text:
          #   "release 1"           → SUFFIX="1"
          #   "release 2.1"         → SUFFIX="2.1"
          #   "release mysql-fix"   → SUFFIX="mysql-fix"
          #   "release hotfix-auth" → SUFFIX="hotfix-auth"
          SUFFIX=$(echo "$COMMIT_MSG" | grep -ioP 'release\s+\K\S+' | head -1)
          if [ -z "$SUFFIX" ]; then
            echo "❌ Could not extract release suffix from commit message: $COMMIT_MSG"
            echo "   Expected format: 'release <version>', e.g. 'release 1' or 'release 2.1'"
            exit 1
          fi
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "Extracted release suffix: $SUFFIX"

      - name: Trigger Woodpecker pipeline
        env:
          WOODPECKER_SERVER: ${{ secrets.WOODPECKER_SERVER }}
          WOODPECKER_TOKEN: ${{ secrets.WOODPECKER_TOKEN }}
          WOODPECKER_ENTERPRISE_REPO_ID: ${{ secrets.WOODPECKER_ENTERPRISE_REPO_ID }}
          RELEASE_SUFFIX: ${{ steps.extract.outputs.suffix }}
        run: |
          echo "Triggering Flipkart enterprise release pipeline..."
          echo "OSS commit: ${{ github.sha }}"
          echo "Release suffix: ${RELEASE_SUFFIX}"

          PAYLOAD=$(cat <<INNEREOF
          {"branch": "ci/flipkart-release-pipeline", "variables": {"RELEASE_TARGET": "flipkart", "FLIPKART_RELEASE_SUFFIX": "${RELEASE_SUFFIX}"}}
          INNEREOF
          )

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${WOODPECKER_SERVER}/api/repos/${WOODPECKER_ENTERPRISE_REPO_ID}/pipelines" \
            -H "Authorization: Bearer ${WOODPECKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully (HTTP $HTTP_CODE)"
            echo "$BODY"
          else
            echo "Failed to trigger pipeline (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
