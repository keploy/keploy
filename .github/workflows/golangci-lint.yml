name: golangci-lint
on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  # Central pin for the keploy/integrations commit this workflow checks
  # out via setup-private-parsers. Mirrors the default in
  # prepare_and_run.yml so all three workflows (prepare_and_run,
  # release, golangci-lint) track the same integrations SHA. Prefer the
  # repo-level `vars.INTEGRATION_REF` when set (so operators can
  # override the pin without editing this file), falling back to the
  # hard-coded SHA.
  #
  # Revert to `main` (drop this key) once keploy/integrations#130 merges.
  INTEGRATION_REF: ${{ vars.INTEGRATION_REF || 'f0115f6426f4105a6674901c89e4e545ae5eca12' }}

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check for direct import of keploy/integrations
        run: |
          if grep -q "keploy/integrations" go.mod go.sum; then
            echo "🚨 keploy/integrations found in manifest files:"
            grep -n "keploy/integrations" go.mod go.sum || true
            echo "Please remove keploy/integrations dependencies as they are not accessible to external contributors."
            exit 1
          fi    
      
      - name: Add Private Parsers
        if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}
          go-cache: true
          # See INTEGRATION_REF in the workflow-level env block.
          integration-ref: ${{ env.INTEGRATION_REF }}

      - name: Configure Git to use SSH
        if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          only-new-issues: true
          args: --timeout=5m

      - name: Check gofmt (diff with line numbers)
        run: |
          output=$(gofmt -l -d .)
          if [ -n "$output" ]; then
            echo "🚨 gofmt found issues:"
            echo "$output"
            exit 1
          fi

      - name: Check for Deprecated Dependencies
        if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        env:
          GOPRIVATE: github.com/keploy/*
        run: |
          source ./.github/workflows/test_workflow_scripts/check-deprecated-deps.sh