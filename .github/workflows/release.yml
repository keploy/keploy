  build-go:
    runs-on: macos-latest
    # runs-on: ubuntu-latest
#    needs: build-ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Private Parsers
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}
          go-cache: true

#      - name: Checkout UI
#        uses: actions/checkout@v4
#        with:
#          repository: keploy/ui
#          path: ui
#
#      - name: Cache UI
#        id: cache-ui
#        uses: actions/cache@v3
#        with:
#          path: web
#          key: ${{ hashFiles('ui/src') }}
      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v5
        with:
          # The certificates in a PKCS12 file encoded as a base64 string created with "openssl base64 -in cert.p12 -out cert-base64.txt"
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          # The password used to import the PKCS12 file.
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      - name:  Install gon for code signing and app notarization
        run: |
          wget -q https://github.com/Bearer/gon/releases/download/v0.0.37/gon_macos.zip
          unzip gon_macos.zip -d /usr/local/bin
          rm -rf gon_macos.zip

      - name: Install cross-compilation tools
        run: |
          brew install mingw-w64
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v1.26.2
          args: release --rm-dist --skip-validate
        env:
          AC_PROVIDER: ${{ secrets.APPLE_ACCOUNT_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.APPLE_ACCOUNT_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BINARY: ${{ secrets.SENTRY_DSN_BINARY }}
          GITHUB_APP_CLIENT_ID: ${{ secrets.CLIENT_ID_GITHUB_APP }}
          SERVER_URL: https://api.keploy.io

  build-docker:
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add Private Parsers
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare Dockerfile for Release Build
        run: |
          cp Dockerfile Dockerfile.release
          sed -i '/COPY go.mod go.sum \/app\//a RUN git config --global url."ssh:\/\/git@github.com\/".insteadOf "https:\/\/github.com\/" \&\& mkdir -p -m 0700 ~\/.ssh \&\& { echo "github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOMqqnxrYX0GvQ3Z8b5vVdBObJ2f9qNpkac8PW3T6g7b"; echo "github.com ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEmKSENjQEezOmxkZMy7opKgwFB9nkt5YRrY\/SGNRIp5HRf7o1qYSMq6h6S4dhp8lN5XdM+sP8lvNabzB6xTnI0="; echo "github.com rsa-sha2-512 AAAAB3NzaC1yc2EAAAADAQABAAABgQCj7ndNxQowgLn3a\/+6EVMblT2TImKt+kNWm1U3VFAj7BO\/P3E42EwS\/N+N5gAe3+q8FPVRfnGVjnRz1hb8fgbzJ8cRtKm6EIHzEbLepFW5C8uK0MJbYGm3M5Dz5PjQqL4M+PEuY1VQ3BqFkP8PU2HhGwWIkGpMpI1f6+JpJQ3XnO9GzGqJHPhq7ZJ5MJHbYfCrH4AJzqHB\/S0Kbl2SFVJLABFrqbI8M\/oUGmT+jlJUBEw6SIenU2MXFuVdxCQHWOdMFkFCUj8Rm\/k+LFqelS6XAaEtJXTLv5eSXNjBkqj7r3hMBbYJJNg+wdXq2oUw2M4NiTy7A0FGqYVD9UVzgw=="; } >> ~\/.ssh\/known_hosts' ./Dockerfile.release
          sed -i 's/RUN go mod download/RUN --mount=type=ssh go mod download/' ./Dockerfile.release
          sed -i '/RUN --mount=type=ssh go mod download/i ENV GOPRIVATE=github.com/keploy/*' ./Dockerfile.release

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          ssh: default
          platforms: linux/amd64, linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_DSN_DOCKER=${{ secrets.SENTRY_DSN_DOCKER }}
            VERSION=${{ env.VERSION }}
            SERVER_URL=https://api.keploy.io
            GITHUB_APP_CLIENT_ID=${{ secrets.CLIENT_ID_GITHUB_APP }}

      - name: Sign the published Docker image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}

  mark-latest:
    needs: [build-go, build-docker]
    runs-on: ubuntu-latest
    # Only mark stable releases (no pre-release suffix like -beta1, -rc1) as latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Mark release as latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_PRERELEASE=$(gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" = "false" ]; then
            gh release edit "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --latest
          else
            echo "Skipping: ${{ github.ref_name }} is a pre-release"
          fi
