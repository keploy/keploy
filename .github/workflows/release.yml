  build-go:
    runs-on: macos-latest
    # runs-on: ubuntu-latest
#    needs: build-ui
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Private Parsers
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}
          go-cache: true

#      - name: Checkout UI
#        uses: actions/checkout@v4
#        with:
#          repository: keploy/ui
#          path: ui
#
#      - name: Cache UI
#        id: cache-ui
#        uses: actions/cache@v3
#        with:
#          path: web
#          key: ${{ hashFiles('ui/src') }}
      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v5
        with:
          # The certificates in a PKCS12 file encoded as a base64 string created with "openssl base64 -in cert.p12 -out cert-base64.txt"
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          # The password used to import the PKCS12 file.
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
      - name:  Install gon for code signing and app notarization
        run: |
          wget -q https://github.com/Bearer/gon/releases/download/v0.0.37/gon_macos.zip
          unzip gon_macos.zip -d /usr/local/bin
          rm -rf gon_macos.zip

      - name: Install cross-compilation tools
        run: |
          brew install mingw-w64
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v1.26.2
          args: release --rm-dist --skip-validate
        env:
          AC_PROVIDER: ${{ secrets.APPLE_ACCOUNT_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.APPLE_ACCOUNT_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN_BINARY: ${{ secrets.SENTRY_DSN_BINARY }}
          SENTRY_DSN_DOCKER: ${{ secrets.SENTRY_DSN_DOCKER }}
          GITHUB_APP_CLIENT_ID: ${{ secrets.CLIENT_ID_GITHUB_APP }}
          SERVER_URL: https://api.keploy.io

      # Re-publish the docker-tagged linux binaries produced by the
      # `keploy-docker` goreleaser build (ldflags bake in
      # SENTRY_DSN_DOCKER instead of SENTRY_DSN_BINARY). build-docker
      # consumes these directly via Dockerfile.runtime — no
      # in-container go build, no qemu arm64 cross-compile.
      # Paths match goreleaser's default
      # `dist/<id>_<os>_<arch>[_<goamd64>]/keploy` layout with globs
      # to absorb the GOAMD64 suffix variant.
      - name: Stage docker linux binaries for docker build
        run: |
          set -euxo pipefail
          mkdir -p out/keploy-linux-amd64 out/keploy-linux-arm64
          amd64_src=$(ls -d dist/keploy-docker_linux_amd64*/keploy | head -n1)
          arm64_src=$(ls -d dist/keploy-docker_linux_arm64*/keploy | head -n1)
          cp "$amd64_src" out/keploy-linux-amd64/keploy
          cp "$arm64_src" out/keploy-linux-arm64/keploy
          chmod +x out/keploy-linux-amd64/keploy out/keploy-linux-arm64/keploy
      - uses: actions/upload-artifact@v4
        with:
          name: release-keploy-linux-amd64
          path: out/keploy-linux-amd64/keploy
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: release-keploy-linux-arm64
          path: out/keploy-linux-arm64/keploy
          retention-days: 1

  build-docker:
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Pull the prebuilt binaries staged by build-go into the layout
      # Dockerfile.runtime expects: dist/keploy-linux-<arch>/keploy.
      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: release-keploy-linux-amd64
          path: dist/keploy-linux-amd64
      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: release-keploy-linux-arm64
          path: dist/keploy-linux-arm64
      - name: Make binaries executable
        run: chmod +x dist/keploy-linux-amd64/keploy dist/keploy-linux-arm64/keploy

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: ./Dockerfile.runtime
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign the published Docker image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}

  mark-latest:
    needs: [build-go, build-docker]
    runs-on: ubuntu-latest
    # Only mark stable releases (no pre-release suffix like -beta1, -rc1) as latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Mark release as latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_PRERELEASE=$(gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" = "false" ]; then
            gh release edit "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --latest
          else
            echo "Skipping: ${{ github.ref_name }} is a pre-release"
          fi
