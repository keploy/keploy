      - name: Setup per-job git isolation
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\setup-git-isolation.ps1"

      - name: Remove workflow start lock
        shell: 'powershell -ExecutionPolicy Bypass -NoProfile -Command "& ''{0}''"'
        run: |
          $lockDir = Join-Path $env:USERPROFILE '.github-workflow-locks'
          $lockPath = Join-Path $lockDir "prepare-windows-workflow-$($env:GITHUB_RUN_ID).lock"
          Remove-Item -Path $lockPath -Force -ErrorAction SilentlyContinue

      - name: Check and cleanup long-running containers (Windows helper)
        id: count_stash
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoProfile -Command "& ''{0}''"'
        run: |
          $script = Join-Path $Env:GITHUB_WORKSPACE '.github/scripts/windows/cleanup-windows.ps1'
          if (Test-Path $script) {
            & $script
          } else {
            Write-Error "Cleanup script not found at $script"
            exit 1
          }

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"

  # -------------------------------------------------------------------
  # Per-platform gates. Names preserved for branch protection so the
  # required-check set does not need to change on merge.
  # -------------------------------------------------------------------

  gate:
    name: CI Gate (Linux)
    if: always()
    needs:
      - build-and-upload
      - upload-latest
      - build-docker-image-amd64
      - run_golang_linux
      - run_golang_wsl
      - run_java_linux
      - run_node_linux
      - run_node_docker
      - run_python_docker
      - run_python_linux
      - run_http_stale_pool_race_linux
      - run_golang_docker
      - run_fuzzer_linux
      - run_grpc_linux
      - run_schema_match_linux
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results=( \
            "${{ needs.build-and-upload.result }}" \
            "${{ needs.upload-latest.result }}" \
            "${{ needs.build-docker-image-amd64.result }}" \
            "${{ needs.run_golang_linux.result }}" \
            "${{ needs.run_golang_wsl.result }}" \
            "${{ needs.run_java_linux.result }}" \
            "${{ needs.run_node_linux.result }}" \
            "${{ needs.run_node_docker.result }}" \
            "${{ needs.run_python_docker.result }}" \
            "${{ needs.run_python_linux.result }}" \
            "${{ needs.run_http_stale_pool_race_linux.result }}" \
            "${{ needs.run_golang_docker.result }}" \
            "${{ needs.run_fuzzer_linux.result }}" \
            "${{ needs.run_grpc_linux.result }}" \
            "${{ needs.run_schema_match_linux.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more upstream jobs failed or were cancelled. Re-run all jobs, not individual ones."
              exit 1
            fi
          done
          echo "All jobs passed."

