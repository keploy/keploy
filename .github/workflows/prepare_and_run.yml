  # -------------------------------------------------------------------
  # macOS test jobs — self-hosted runner loads the linux/arm64 image
  # (Docker Desktop on Apple Silicon runs linux containers natively).
  # -------------------------------------------------------------------

  precheck-macos:
    # Pre-flight sanity on the self-hosted macOS runner: create the
    # workflow start lock that clean_up_docker_macos consumes, unlock
    # the keychain, and confirm Docker Desktop is up. Fails fast
    # BEFORE the parallel test jobs spin up, so a runner that booted
    # without Docker Desktop doesn't waste 10 min of downstream time.
    # The docker image itself is loaded inside each downstream test
    # job via the download-image composite action — pre-loading here
    # would duplicate the artifact download + docker load for every
    # test job.
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: [self-hosted, macOS, native]
    timeout-minutes: 10
    steps:
      - name: Create workflow start lock
        run: |
          LOCK_DIR="$HOME/.github-workflow-locks"
          mkdir -p "$LOCK_DIR"
          echo "started-$(date +%s)" > "$LOCK_DIR/prepare-macos-workflow-${{ github.run_id }}.lock"

      - name: Unlock keychain
        if: runner.os == 'macOS'
        run: |
          security unlock-keychain -p $KEYCHAIN_PASSWORD
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MAC_RUNNER_USER_PASSWORD }}

      - name: Verify Docker Desktop is running (macOS)
        run: |
          if ! docker info >/dev/null 2>&1; then
            echo "ERROR: Docker Desktop is not running."
            echo "Ensure Docker Desktop is configured as a Login Item on the self-hosted runner."
            exit 1
          fi
          echo "Docker Desktop is running."

  run_python_docker_macos:
    needs: [build-darwin-arm64, precheck-macos, build-docker-image-arm64]
    uses: ./.github/workflows/python_docker_macos.yml
    secrets:
      MAC_RUNNER_USER_PASSWORD: ${{ secrets.MAC_RUNNER_USER_PASSWORD }}

  run_golang_docker_macos:
    needs: [build-darwin-arm64, precheck-macos, build-docker-image-arm64]
    uses: ./.github/workflows/golang_docker_macos.yml
    secrets:
      MAC_RUNNER_USER_PASSWORD: ${{ secrets.MAC_RUNNER_USER_PASSWORD }}

  clean_up_docker_macos:
    if: ${{ always() && ((github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    runs-on: [self-hosted, macOS, native]
    needs: [run_python_docker_macos, run_golang_docker_macos]
    timeout-minutes: 10
    steps:
      - name: Verify Docker Desktop is running (macOS)
        continue-on-error: true
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker Desktop is running."
          else
            echo "WARNING: Docker Desktop is not running. Cleanup will be skipped."
          fi

      - name: Unlock keychain
        if: runner.os == 'macOS'
        run: |
          security unlock-keychain -p $KEYCHAIN_PASSWORD
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MAC_RUNNER_USER_PASSWORD }}

      - name: Remove workflow lock file
        if: always()
        run: |
          LOCK_DIR="$HOME/.github-workflow-locks"
          LOCK_FILE="$LOCK_DIR/prepare-macos-workflow-${{ github.run_id }}.lock"

          if [ -f "$LOCK_FILE" ]; then
            echo "Removing workflow lock file: $LOCK_FILE"
            rm -f "$LOCK_FILE"
          else
            echo "Lock file not found (may have been cleaned up already): $LOCK_FILE"
          fi

          echo "Cleaning up stale lock files older than 24 hours..."
          find "$LOCK_DIR" -name "prepare-macos-workflow-*.lock" -type f -mtime +1 -delete 2>/dev/null || true

      - name: Stop long-running containers (macOS)
        id: stop_longrunning
        run: |
          # Stop containers running longer than 30 minutes, except buildx containers.
          stopped_any=0
          now=$(date +%s)
          while read -r cid cname; do
            started=$(docker inspect --format '{{.State.StartedAt}}' "$cid" 2>/dev/null || true)
            if [ -z "$started" ]; then
              continue
            fi
            started_norm=$(echo "$started" | sed -E 's/\.[0-9]+//; s/Z$/+0000/; s/([+-][0-9]{2}):([0-9]{2})$/\1\2/')
            epoch=$(date -j -f "%Y-%m-%dT%H:%M:%S%z" "$started_norm" "+%s" 2>/dev/null || echo 0)
            if [ -z "$epoch" ] || [ "$epoch" -eq 0 ]; then
              echo "Could not parse start time for container $cid: $started"
              continue
            fi
            if [ "$epoch" -lt $((now - 1800)) ]; then
              if [[ "$cname" == buildx* ]]; then
                echo "Skipping buildx container $cid ($cname)"
                continue
              fi
              echo "Removing long-running container $cid ($cname) started at $started"
              docker rm -f "$cid" || true
              stopped_any=1
            fi
          done < <(docker ps -a --format '{{.ID}} {{.Names}}')
          echo "stopped_any=$stopped_any" >> $GITHUB_OUTPUT

      - name: Docker cleanup (scoped to this workflow run)
        run: |
          echo "Cleaning up resources for run ${{ github.run_id }}..."

          if ! docker info >/dev/null 2>&1; then
            echo "Docker is not available, skipping cleanup."
            exit 0
          fi

          RUN_ID="${{ github.run_id }}"
          for prefix in ginApp_ mongoDb_ keploy_ginmongo_ echoApp_ postgresDb_ keploy_ flaskApp_ mongo_; do
            ids=$(docker ps -aq --filter "name=${prefix}${RUN_ID}" 2>/dev/null || true)
            if [ -n "$ids" ]; then
              docker rm -f $ids 2>/dev/null || true
            fi
          done

          for net in $(docker network ls --format '{{.Name}}' | grep -E "^keploy-network-${RUN_ID}-" 2>/dev/null); do
            docker network rm "$net" 2>/dev/null || true
          done

          echo "Pruning dangling Docker images..."
          docker image prune -f 2>/dev/null || true
          echo "Pruning dangling Docker volumes..."
          docker volume prune -f 2>/dev/null || true

          echo "Docker cleanup completed."

  # -------------------------------------------------------------------
  # Windows test jobs — self-hosted runner loads the linux/amd64 image
  # (Docker Desktop on Windows runs linux containers via WSL2).
  # -------------------------------------------------------------------

  precheck-windows:
    # Pre-flight sanity on the self-hosted Windows runner: set up
    # per-job git isolation and confirm Docker Desktop is up. Fails
    # fast BEFORE the parallel Windows test jobs spin up. The docker
    # image itself is loaded inside each downstream test job via the
    # download-image composite action — pre-loading here would
    # duplicate the artifact download + docker load for every test.
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: [self-hosted, Windows, X64]
    # Same rationale as build-windows-amd64: bound the wall-clock so a
    # hung self-hosted Windows runner cannot stall the whole pipeline.
    timeout-minutes: 30
    steps:
      # Create a minimal per-job gitconfig BEFORE checkout to prevent
      # concurrent jobs' SSH redirects from leaking into our checkout.
      - name: Pre-checkout git isolation
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          $isoName = $env:GIT_ISOLATION_ID
          if ([string]::IsNullOrWhiteSpace($isoName)) {
            $isoName = "$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT-$env:GITHUB_JOB-$([guid]::NewGuid().ToString('N'))"
            $isoName = $isoName -replace '[^A-Za-z0-9._-]', '_'
          }
          $isoDir = Join-Path (Join-Path $env:USERPROFILE ".git-isolation") $isoName
          New-Item -Path $isoDir -ItemType Directory -Force | Out-Null
          $gitConfig = Join-Path $isoDir 'gitconfig'
          New-Item -Path $gitConfig -ItemType File -Force | Out-Null
          git config --file $gitConfig core.autocrlf false
          git config --file $gitConfig core.eol lf
          "GIT_CONFIG_GLOBAL=$gitConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GIT_ISOLATION_ID=$isoName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # See build-windows-amd64's "Recover broken workspace" step for rationale.
      - name: Recover stale runner state
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          $ErrorActionPreference = 'Continue'
          try {
            # 1. Kill any keploy processes left over from a prior run on this
            #    self-hosted runner. They hold open file handles into the
            #    workspace bin/ (notably WinDivert64.sys, the kernel driver
            #    keploy uses for Windows traffic redirection), which makes
            #    actions/checkout's clean step fail with EPERM on unlink.
            Get-Process -Name 'keploy' -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Stopping leftover keploy.exe pid=$($_.Id)"
              try { $_ | Stop-Process -Force -ErrorAction SilentlyContinue } catch {}
            }

            # 2. Stop the WinDivert kernel driver if it's still loaded.
            #    keploy registers it as an SCM service named "WinDivert"
            #    (or "WinDivert64" on some versions); leaving it running
            #    pins the .sys file in the workspace and causes the same
            #    EPERM observed at checkout-clean time.
            foreach ($name in @('WinDivert', 'WinDivert64')) {
              $svc = Get-Service -Name $name -ErrorAction SilentlyContinue
              if ($svc -and $svc.Status -ne 'Stopped') {
                Write-Host "Stopping kernel driver service $name (status=$($svc.Status))"
                try { Stop-Service -Name $name -Force -ErrorAction SilentlyContinue } catch {}
              }
            }

            # 3. If a prior run was interrupted partway through cleanup the
            #    workspace can end up with files but no .git, which makes
            #    actions/checkout's clean:true fail with "not a git
            #    repository". Wipe in that case so checkout starts fresh.
            #    Healthy workspaces (with valid .git) are left alone so the
            #    existing fast path (clean+fetch over an existing clone)
            #    keeps working.
            $ws = $env:GITHUB_WORKSPACE
            if ($ws -and (Test-Path $ws)) {
              $gitDir = Join-Path $ws '.git'
              $items = @(Get-ChildItem -Path $ws -Force -ErrorAction SilentlyContinue)
              $hasFiles = $items.Count -gt 0
              if ($hasFiles -and -not (Test-Path $gitDir)) {
                Write-Host "::warning::Workspace $ws has files but no .git -- wiping for fresh checkout (prior run was interrupted)"
                Remove-Item -Path (Join-Path $ws '*') -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
          } catch {
            Write-Host "::warning::Recover stale runner state: $_"
          }
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup per-job git isolation
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\setup-git-isolation.ps1"

      - name: Ensure Docker is running
        shell: 'powershell -ExecutionPolicy Bypass -NoProfile -Command "& ''{0}''"'
        run: |
          $script = Join-Path $Env:GITHUB_WORKSPACE '.github/scripts/windows/ensure-docker.ps1'
          if (Test-Path $script) { & $script } else { Write-Error "Required helper script not found: $script"; exit 1 }

      - name: Wait for Docker to be ready
        shell: 'powershell -ExecutionPolicy Bypass -NoProfile -Command "& ''{0}''"'
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
            $attempt++
            try {
              $result = docker info 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Docker is ready after $attempt attempts"
                break
              }
            } catch {}
            Write-Host "Waiting for Docker... attempt $attempt/$maxAttempts"
            Start-Sleep -Seconds 2
          }
          if ($attempt -eq $maxAttempts) {
            Write-Error "Docker did not become ready in time"
            exit 1
          }

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"

  run_golang_docker_windows:
    needs: [build-windows-amd64, build-docker-image-amd64, precheck-windows]
    uses: ./.github/workflows/golang_docker_windows.yml

