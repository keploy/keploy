name: Python On Docker (macOS)
on:
  workflow_call:
    inputs:
      image_tag:            
        description: "Docker image tag or digest to pull"
        required: false
        type: string
    secrets:
      MAC_RUNNER_USER_PASSWORD:
        description: "Keychain password for macOS runner"
        required: true

jobs:
  python_docker_macos:
    # concurrency:
    #   group: macos-keploy-${{ github.ref }}
    #   cancel-in-progress: false
    runs-on: [self-hosted, macOS, native]
    strategy:
      fail-fast: false
      matrix:
        include:
          # - job: record_latest_replay_build
          #   record_src: latest
          #   replay_src: build
          # - job: record_latest_replay_latest
          #   record_src: latest
          #   replay_src: latest


          - job: record_build_replay_build
            record_src: build
            replay_src: build

    name: ${{ matrix.job }} (macOS)

    steps:
      - name: Unlock keychain
        if: runner.os == 'macOS'
        run: |
          security unlock-keychain -p $KEYCHAIN_PASSWORD
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MAC_RUNNER_USER_PASSWORD }}

      - name: Clean up git config
        if: always()
        continue-on-error: true
        run: |
          rm -rf ~/.gitconfig

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker Desktop is running (macOS)
        shell: bash
        run: |
          set -e
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon is already running."
          else
            echo "Docker daemon not responding. Starting via launchctl..."
            launchctl start com.docker.docker 2>/dev/null \
              || open -g -a Docker
            for i in $(seq 1 90); do
              if docker info >/dev/null 2>&1; then
                echo "Docker Desktop is ready (waited ~$((i*2))s)."
                break
              fi
              if [ "$i" -eq 90 ]; then
                echo "ERROR: Docker Desktop failed to start within 180s."
                exit 1
              fi
              sleep 2
            done
          fi

      - name: Clean up stale Docker state
        continue-on-error: true
        run: |
          docker container prune -f 2>/dev/null || true
          docker network prune -f 2>/dev/null || true

      - id: image
        uses: ./.github/actions/download-image
        with:
          image_tag: ${{ inputs.image_tag }}
          version: ${{ github.sha }}

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.replay_src }}

      - name: Checkout the samples-python repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-python
          path: samples-python

      - name: Run the flask-mongo application (macOS)
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          JOB_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        shell: bash
        run: |
          cd samples-python/flask-mongo
          bash $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/python-docker-macos.sh

      - name: Kill the running script processes
        if: always()
        continue-on-error: true
        run: |
          pkill -f "bash $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/python-docker-macos.sh" || true

      - name: Clean up Docker artifacts
        if: always()
        continue-on-error: true
        env:
          JOB_ID: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}
        run: |
          # Remove JOB_ID-suffixed containers created by the test script
          for prefix in flaskApp mongo keploy; do
            ids=$(docker ps -aq --filter "name=${prefix}_${JOB_ID}" 2>/dev/null || true)
            if [ -n "$ids" ]; then
              docker rm -f $ids 2>/dev/null || true
            fi
          done
          # Remove any containers still attached to keploy-network
          ids=$(docker ps -aq --filter "network=keploy-network" 2>/dev/null || true)
          if [ -n "$ids" ]; then
            docker rm -f $ids 2>/dev/null || true
          fi
          docker network rm keploy-network 2>/dev/null || true
          pkill -9 -f 'keploy' 2>/dev/null || true

      - name: Clean up git config
        if: always()
        continue-on-error: true
        run: |
          git config --global --unset-all url."git@github.com:".insteadOf 2>/dev/null || true
          git config --global --unset-all url."ssh://git@github.com/".insteadOf 2>/dev/null || true
          git config --global --unset-all core.sshCommand 2>/dev/null || true