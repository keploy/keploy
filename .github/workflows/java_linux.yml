name: Java on Linux
on:
  workflow_call:
jobs:
  java_linux:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: spring-petclinic-rest
            path: spring-petclinic/spring-petclinic-rest
            script_dir: spring_petclinic
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build-no-race
          - job: record_build_replay_latest
            record_src: build-no-race
            replay_src: latest
          - job: record_build_replay_build
            record_src: build-no-race
            replay_src: build-no-race
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout samples-java repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-java
          path: samples-java

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: samples-java/${{ matrix.app.path }}/pom.xml

      - name: Run the ${{ matrix.app.name }} app
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          # RCA instrumentation for postgres-v3 per-test window misalignment
          # (see PR #4126 / feat/postgres-v3-copy-schema). Logs the live PG
          # bind values on every replay-time matcher miss so the recorded
          # mocks.yaml + test_logs.txt artifacts below can be cross-checked
          # offline. Logging is a no-op when the matcher succeeds.
          KEPLOY_PG_V3_LOG_BIND_VALUES: "1"
        run: |
          cd samples-java/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/java/${{ matrix.app.script_dir }}/java-linux.sh

      - name: Upload ${{ matrix.app.name }} recorded mocks and replay logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-${{ matrix.config.job }}-recordings
          path: |
            samples-java/${{ matrix.app.path }}/keploy/
            samples-java/${{ matrix.app.path }}/test_logs.txt
            samples-java/${{ matrix.app.path }}/javaApp_*.txt
            samples-java/${{ matrix.app.path }}/mvn_build.log
          if-no-files-found: warn
          retention-days: 7

  mysql_dual_conn:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build-no-race
          - job: record_build_replay_latest
            record_src: build-no-race
            replay_src: latest
          - job: record_build_replay_build
            record_src: build-no-race
            replay_src: build-no-race
    name: mysql-dual-conn (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout samples-java repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-java
          path: samples-java

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: samples-java/mysql-dual-conn/pom.xml

      - name: Run mysql-dual-conn app
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-java/mysql-dual-conn
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/java/mysql_dual_conn/java-linux.sh

  tidb_stmt_cache:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # NOTE: this job intentionally OMITS the record_build_replay_latest
        # cell (record with this build, replay with the latest *release*).
        # tidb-stmt-cache exercises the COM_QUERY stateful read-back fix this PR
        # introduces; the latest released binary does not have it yet, so
        # replaying these recordings with it reproduces the very bug being fixed
        # (read-back returns the first row — e.g. 100 for every test) and the
        # cell can never be green until the fix ships in a release. The two
        # remaining cells both replay with the fixed build binary and fully
        # validate the fix (record_latest_replay_build also confirms the new
        # binary replays mocks recorded by the previous release). Re-add
        # record_build_replay_latest for forward-compat once the fix is released.
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build-no-race
          - job: record_build_replay_build
            record_src: build-no-race
            replay_src: build-no-race
    name: tidb-stmt-cache (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout samples-java repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-java
          path: samples-java

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: samples-java/tidb-stmt-cache/pom.xml

      - name: Run tidb-stmt-cache app
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-java/tidb-stmt-cache
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/java/tidb_stmt_cache/java-linux.sh

      - name: Upload tidb-stmt-cache recordings and replay logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tidb-stmt-cache-${{ matrix.config.job }}-recordings
          path: |
            samples-java/tidb-stmt-cache/keploy/
            samples-java/tidb-stmt-cache/test_logs_*.txt
            samples-java/tidb-stmt-cache/record.txt
            samples-java/tidb-stmt-cache/mvn_build.log
          if-no-files-found: warn
          retention-days: 7

  async_config_poll:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The async-egress engine (keploy#4368) ships in no released binary, so
        # BOTH record and replay use this build. The record_*_latest /
        # replay_latest cells are intentionally omitted: the released binary can
        # neither stamp async mocks (record) nor serve them (replay), so those
        # cells could never validate the feature. Re-add them once async ships.
        config:
          - job: record_build_replay_build
            record_src: build-no-race
            replay_src: build-no-race
    name: async-config-poll (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout samples-java repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-java
          path: samples-java

      # Spring Boot 1.5 sample -> Java 8 (not the Java 17 the other jobs use);
      # the run script deliberately does not source update-java.sh.
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          cache-dependency-path: samples-java/async-config-poll/pom.xml

      - name: Set up Go (for the config-service stub)
        uses: actions/setup-go@v6
        with:
          go-version: "1.21"

      - name: Run async-config-poll app
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-java/async-config-poll
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/java/async_config_poll/java-linux.sh

      - name: Upload async-config-poll recordings and replay logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: async-config-poll-${{ matrix.config.job }}-recordings
          path: |
            samples-java/async-config-poll/keploy/
            samples-java/async-config-poll/test_logs.txt
            samples-java/async-config-poll/record.txt
            samples-java/async-config-poll/mvn_build.log
            samples-java/async-config-poll/config-stub.log
          if-no-files-found: warn
          retention-days: 7
