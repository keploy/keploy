name: TLS pcap + keylog (sample-tls-app)

# End-to-end coverage for keploy's TLS capture features. The job
# exercises the proxy in two modes against a heterogeneous workload:
#
#   1. capture-only       (--capture-packets, default record path)
#   2. with-opportunistic (--capture-packets --opportunistic-tls-intercept,
#                          peek-and-hijack passthrough variant)
#
# Workload: ayush3160/sample-tls-app, which emits real outbound
# TLS to:
#   - HTTPS  (a local TLS-1.3 upstream over two hostnames; replaces the
#             former api.github.com / httpbin.org calls, which
#             rate-limited and went down often enough to make this job
#             flaky — the upstream fixture ships with the sample app at
#             ci/tls-upstream)
#   - MySQL  (TLS, brought up locally via docker compose)
#   - Postgres (TLS, brought up locally via docker compose)
#
# Per protocol asserts:
#   - pcap + keylog stream to disk during recording
#   - app's TLS validation passes against the OS root pool — proves
#     keploy's MITM CA is correctly auto-installed
#   - DB round-trip (INSERT then SELECT) works through the proxy
#   - For HTTP, tshark + keylog recovers cleartext requests/responses
#
# Catches regressions in the broadcaster / keylog fanout, the
# streaming endpoints, the recorder-side stream goroutine, the
# opportunistic peek-and-hijack flow, and any tls.Config site whose
# KeyLogWriter wiring breaks.

on:
  workflow_call:

jobs:
  sample_tls_pcap:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
        mode:
          - name: capture-only
            flags: "--capture-packets"
            description: "default record path; parsers handle protocol-aware MITM"
          - name: with-opportunistic
            flags: "--capture-packets --opportunistic-tls-intercept"
            description: "peek-and-hijack passthrough; no parser dispatch after MITM"
    name: ${{ matrix.config.job }} (${{ matrix.mode.name }})
    steps:
      - name: Checkout keploy repository
        uses: actions/checkout@v4

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout sample-tls-app
        uses: actions/checkout@v4
        with:
          repository: ayush3160/sample-tls-app
          path: sample-tls-app
          ref: main

      - name: Install tshark + openssl for pcap decryption check
        run: |
          # GitHub's ubuntu-24.04 runner image ships third-party apt
          # repositories (packages.microsoft.com — azure-cli + prod) that this
          # job does not use: tshark and openssl come from the Ubuntu
          # main/universe archives. That host intermittently serves a corrupt
          # InRelease ("Clearsigned file isn't valid, got 'NOSPLIT'"), which
          # makes `apt-get update` exit 100 and — under this step's default
          # `bash -eo pipefail` shell — takes the whole job down before keploy
          # ever runs. Drop every apt source pointing at that host so
          # `apt-get update` only consults the repos we actually depend on.
          # The `|| true` keeps a benign no-match (grep exit 1, which pipefail
          # would otherwise propagate) from aborting the step, while a real
          # `rm` failure still surfaces. Deterministic — no retry, no sleep.
          { sudo grep -rlZ 'packages.microsoft.com' /etc/apt/sources.list.d/ 2>/dev/null || true; } \
            | sudo xargs -0r rm -f
          sudo apt-get update -qq
          # Pre-accept the wireshark-common dump-cap suid prompt so the
          # apt install runs non-interactively.
          echo 'wireshark-common wireshark-common/install-setuid boolean false' | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq tshark openssl

      - name: Run sample-tls-app under keploy (${{ matrix.mode.name }})
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          KEPLOY_FLAGS: ${{ matrix.mode.flags }}
          MODE_NAME: ${{ matrix.mode.name }}
        run: |
          cd sample-tls-app
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/sample-tls-pcap.sh
