name: Golang On Linux
on:
  workflow_call:
    inputs:
      runner:
        description: 'The type of runner to use for this job'
        type: string
        required: false
        default: 'ubuntu-latest'
      jobs_to_run:
        description: 'Controls which jobs to run. "all" runs everything.'
        type: string
        required: false
        default: 'all'

jobs:
  golang_linux:
    if: ${{ inputs.jobs_to_run == 'all' }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: echo-mysql
            path: echo-mysql
            script_dir: echo_mysql
            enable_ssl: true
          - name: echo-mysql
            path: echo-mysql
            script_dir: echo_mysql
            enable_ssl: false
          - name: http-pokeapi
            path: http-pokeapi
            script_dir: http_pokeapi
          - name: risk-profile
            path: risk-profile
            script_dir: risk_profile
          - name: sse-preflight
            path: sse-preflight
            script_dir: sse_preflight
          - name: connect-tunnel
            path: connect-tunnel
            script_dir: connect_tunnel
          - name: dns-mock-test
            path: dns-mock-test
            script_dir: dns_mock
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})${{ matrix.app.enable_ssl != null && format(' ssl-{0}', matrix.app.enable_ssl) || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: keploy/keploy

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o yq
          chmod +x yq
          sudo mv yq /usr/bin/
          
      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout the samples-go repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          path: samples-go
          ref: main
      - name: Run ${{ matrix.app.name }} application
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          ENABLE_SSL: ${{ matrix.app.enable_ssl || 'false' }}
        run: |
          cd samples-go/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/golang/${{ matrix.app.script_dir }}/golang-linux.sh

  golang_linux_private:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: gin-mongo
            path: gin-mongo
            script_dir: gin_mongo
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: keploy/keploy

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout the samples-go repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          path: samples-go
          ref: native-linux
      - name: Run ${{ matrix.app.name }} application
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-go/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/golang/${{ matrix.app.script_dir }}/golang-linux.sh

  dns_dedup_test:
    if: ${{ inputs.jobs_to_run == 'all' }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: dns_dedup - ${{ matrix.config.job }}
    steps:
      - name: Checkout Keploy
        uses: actions/checkout@v4
        with:
          repository: keploy/keploy

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout samples-go
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          path: samples-go

      - name: Run Test
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-go/dns-dedup
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/golang/dns_dedup/golang-linux.sh

  golang_linux_replay:
    if: ${{ inputs.jobs_to_run == 'all' }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: http-sse
            path: http-sse
          - name: simple-grpc
            path: simple-grpc
        config:
          - job: replay_latest
            replay_src: latest
          - job: replay_build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: keploy/keploy

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o yq
          chmod +x yq
          sudo mv yq /usr/bin/

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout the samples-go repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          path: samples-go
      - name: Run ${{ matrix.app.name }} application
        env:
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-go/${{ matrix.app.path }}
          download_go_modules() {
            local attempt=1
            local max_attempts=4
            local sleep_sec=5
            local go_proxy="https://proxy.golang.org,direct"
            while [ "$attempt" -le "$max_attempts" ]; do
              if GOPROXY="$go_proxy" go mod download; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::go mod download failed after ${max_attempts} attempts"
                return 1
              fi
              if [ "$attempt" -eq 2 ]; then
                go_proxy="direct"
              fi
              echo "go mod download attempt ${attempt} failed; retrying in ${sleep_sec}s"
              sleep "$sleep_sec"
              sleep_sec=$((sleep_sec * 2))
              attempt=$((attempt + 1))
            done
          }
          download_go_modules
          $REPLAY_BIN test --port 8000 --sse-port 8047 --api-timeout 200 --delay 30

      - name: Test port mapping (http-sse only)
        if: matrix.app.name == 'http-sse'
        env:
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-go/${{ matrix.app.path }}
          SKIP_PING_SERVER=1 $REPLAY_BIN test --test-sets port-mapping-test --api-timeout 200 --delay 30
