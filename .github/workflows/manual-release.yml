name: Manual Release Trigger

on:
  workflow_dispatch:
    inputs:
      oss_branch:
        description: 'OSS branch to build from (keploy/keploy). Defaults to flipkart.'
        required: false
        default: 'flipkart'
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  trigger-release:
    name: Trigger release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve commit
        id: commit
        env:
          OSS_BRANCH: ${{ inputs.oss_branch || 'flipkart' }}
        run: |
          set -e
          source_repo="https://github.com/keploy/keploy.git"
          source_branch="${OSS_BRANCH}"
          commit_sha="$(git ls-remote "${source_repo}" "refs/heads/${source_branch}" | awk '{print $1}')"
          if [ -z "$commit_sha" ]; then
            echo "Failed to resolve the head commit for branch '${source_branch}' from repository '${source_repo}'."
            echo "Verify that the branch exists and that GitHub is reachable from this runner, then retry."
            exit 1
          fi
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved latest ${source_branch} branch commit to ${commit_sha}"

      - name: Trigger enterprise pipeline
        env:
          WOODPECKER_SERVER: ${{ secrets.WOODPECKER_SERVER }}
          WOODPECKER_TOKEN: ${{ secrets.WOODPECKER_TOKEN }}
          WOODPECKER_ENTERPRISE_REPO_ID: ${{ secrets.WOODPECKER_ENTERPRISE_REPO_ID }}
          ENTERPRISE_BRANCH: main
          OSS_COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -e

          if [ -z "${WOODPECKER_SERVER:-}" ]; then
            echo "Missing required secret: WOODPECKER_SERVER. Configure the repository secret and retry."
            exit 1
          fi
          if [ -z "${WOODPECKER_TOKEN:-}" ]; then
            echo "Missing required secret: WOODPECKER_TOKEN. Configure the repository secret and retry."
            exit 1
          fi
          if [ -z "${WOODPECKER_ENTERPRISE_REPO_ID:-}" ]; then
            echo "Missing required secret: WOODPECKER_ENTERPRISE_REPO_ID. Configure the repository secret and retry."
            exit 1
          fi

          echo "Triggering enterprise pipeline on branch: ${ENTERPRISE_BRANCH}"
          echo "Using OSS commit: ${OSS_COMMIT_SHA}"

          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"branch": os.environ["ENTERPRISE_BRANCH"], "variables": {"OSS_COMMIT_SHA": os.environ["OSS_COMMIT_SHA"]}}))')

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${WOODPECKER_SERVER}/api/repos/${WOODPECKER_ENTERPRISE_REPO_ID}/pipelines" \
            -H "Authorization: Bearer ${WOODPECKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully (HTTP $HTTP_CODE)"
            echo "$BODY"
          else
            echo "Failed to trigger pipeline (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
