name: Manual Release Trigger

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or ref to resolve. Leave empty to use the selected workflow ref.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  trigger-release:
    name: Trigger release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve commit
        id: commit
        run: |
          set -e
          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "Resolved commit: $commit_sha"

      - name: Trigger enterprise pipeline
        env:
          WOODPECKER_SERVER: ${{ secrets.WOODPECKER_SERVER }}
          WOODPECKER_TOKEN: ${{ secrets.WOODPECKER_TOKEN }}
          WOODPECKER_ENTERPRISE_REPO_ID: ${{ secrets.WOODPECKER_ENTERPRISE_REPO_ID }}
          OSS_COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          set -e
          echo "Triggering enterprise pipeline for commit: ${OSS_COMMIT_SHA}"

          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"branch": "ci/flipkart-release-pipeline", "variables": {"OSS_COMMIT_SHA": os.environ["OSS_COMMIT_SHA"]}}))')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${WOODPECKER_SERVER}/api/repos/${WOODPECKER_ENTERPRISE_REPO_ID}/pipelines" \
            -H "Authorization: Bearer ${WOODPECKER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully (HTTP $HTTP_CODE)"
            echo "$BODY"
          else
            echo "Failed to trigger pipeline (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
