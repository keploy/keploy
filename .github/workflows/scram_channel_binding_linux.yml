name: SCRAM Channel Binding (Linux)
# E2E for the BPF channel-binding shim — verifies SCRAM-SHA-256-PLUS
# works through keploy's TLS MITM for postgres clients whose libcrypto
# is auditwheel-bundled under RTLD_LOCAL (the case that broke the old
# LD_PRELOAD cbshim and motivated the eBPF rewrite in PR #4239).
#
# The matrix follows the standard OSS pattern: three record/replay
# binary combinations. SCRAM-PLUS support is NEW in the PR's `build`
# binary, so the legs that pair `latest` with anything will fail until
# a release containing the cbshim ships — they're marked
# continue-on-error: true so the failure is visible without blocking
# PR merges. Flip to a hard gate once a release containing the fix is
# published as `latest`. Mirrors the pattern used by
# outbound-fin-stall-linux.yml and http-stale-pool-race-linux.yml for
# regressions where `latest` is expected to be red until the next
# release.
on:
  workflow_call:
    inputs:
      runner:
        description: 'The type of runner to use for this job'
        type: string
        required: false
        default: 'ubuntu-latest'
      jobs_to_run:
        description: 'Controls which jobs to run. "all" runs everything.'
        type: string
        required: false
        default: 'all'

jobs:
  scram_channel_binding_linux:
    if: ${{ inputs.jobs_to_run == 'all' }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - job: record_build_replay_build
            record_src: build
            replay_src: build
            # PR's binary on both sides — MUST pass. If this leg fails,
            # the cbshim regressed (BPF probe, attach loop, cbmap
            # rendezvous, or the SCRAM-PLUS path itself).
            continue_on_error: false
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
            # Record with PR (has cbshim), replay with `latest` (no
            # cbshim). Replay's libpq will try SCRAM-PLUS against the
            # keploy mock, which serves the recorded PostgresV3 mock
            # — channel binding isn't actually checked at that point,
            # so replay should pass even without cbshim. Marked
            # continue-on-error so a version-skew quirk in PG mock
            # encoding doesn't block PR merges.
            continue_on_error: true
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
            # Record with `latest` (no cbshim) — channel-binding fails
            # at the TLS handshake, no postgres mocks get captured.
            # This leg is EXPECTED to fail until a release containing
            # the cbshim ships as `latest`. Documents the bug without
            # blocking merges.
            continue_on_error: true
    name: scram-channel-binding (${{ matrix.config.job }})
    timeout-minutes: 20
    continue-on-error: ${{ matrix.config.continue_on_error }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: keploy/keploy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup docker-compose
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.33.1/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Run scram-channel-binding e2e
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        # bash <script> rather than source so the script's intentional
        # `set +e` is preserved (the workflow's default -eo pipefail
        # would otherwise short-circuit the cleanup paths).
        run: |
          bash "$GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/python/scram-channel-binding/python-linux.sh"

      - name: Upload logs and recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scram-channel-binding-${{ matrix.config.job }}-logs
          path: |
            .github/workflows/test_workflow_scripts/python/scram-channel-binding/record_logs.txt
            .github/workflows/test_workflow_scripts/python/scram-channel-binding/test_logs.txt
            .github/workflows/test_workflow_scripts/python/scram-channel-binding/keploy/
          if-no-files-found: warn
          retention-days: 7
