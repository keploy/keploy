name: Go on Windows

on:
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build amd64
        run: |
          set GOARCH=amd64
          go build -v ./...
        shell: cmd

      - name: Build arm64
        run: |
          set GOARCH=arm64
          go build -v ./...
        shell: cmd