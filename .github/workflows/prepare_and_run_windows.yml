name: Prepare Binary and Run Workflows (Windows)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  _ISO_ROOT: .git-isolation

jobs:
  build-and-upload:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Create workflow start lock
        shell: powershell
        run: |
          $lockDir = Join-Path $env:USERPROFILE '.github-workflow-locks'
          New-Item -Path $lockDir -ItemType Directory -Force | Out-Null
          $timestamp = (Get-Date -UFormat %s)
          $lockPath = Join-Path $lockDir "prepare-windows-workflow-$($env:GITHUB_RUN_ID).lock"
          Set-Content -Path $lockPath -Value "started-$timestamp"
          Write-Host "Created workflow start lock: $lockPath"

      # Inline because this runs BEFORE checkout (workspace may not exist).
      # Logic mirrors .github/scripts/windows/setup-git-isolation.ps1.
      - name: Setup per-run git isolation
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $isoDir = Join-Path $env:USERPROFILE "${{ env._ISO_ROOT }}" $env:GITHUB_RUN_ID
          New-Item -Path $isoDir -ItemType Directory -Force | Out-Null

          # Seed per-run gitconfig from the global one (if it exists)
          $gitConfig = Join-Path $isoDir 'gitconfig'
          $globalCfg = Join-Path $env:USERPROFILE '.gitconfig'
          if (Test-Path $globalCfg) { Copy-Item $globalCfg $gitConfig -Force } else { New-Item -Path $gitConfig -ItemType File -Force | Out-Null }

          # Remove inherited SSH redirect settings so the initial
          # actions/checkout always uses HTTPS (before ssh-agent is loaded).
          $staleKeys = @(
              'url."git@github.com:".insteadOf',
              'url."ssh://git@github.com/".insteadOf',
              'core.sshCommand'
          )
          foreach ($key in $staleKeys) {
              git config --file $gitConfig --unset-all $key 2>$null
              if ($LASTEXITCODE -gt 1 -and $LASTEXITCODE -ne 5) {
                  throw "Failed to unset '$key' (exit code $LASTEXITCODE)"
              }
          }

          # Liveness marker so cleanup can detect active runs
          Set-Content -Path (Join-Path $isoDir '.active') -Value (Get-Date -UFormat '%s')

          # Set EOL handling
          git config --file $gitConfig core.autocrlf false
          if ($LASTEXITCODE -ne 0) { throw "git config core.autocrlf failed (exit $LASTEXITCODE)" }
          git config --file $gitConfig core.eol lf
          if ($LASTEXITCODE -ne 0) { throw "git config core.eol failed (exit $LASTEXITCODE)" }

          # Per-run SSH known_hosts
          $knownHosts = Join-Path $isoDir 'known_hosts'
          $hostKeys = ssh-keyscan github.com 2>$null
          if ([string]::IsNullOrWhiteSpace(($hostKeys | Out-String))) {
              throw "ssh-keyscan did not return any host keys for github.com. Check network access from this runner."
          }
          $hostKeys | Out-File -FilePath $knownHosts -Encoding ascii

          # Export env vars
          "GIT_CONFIG_GLOBAL=$gitConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GIT_SSH_COMMAND=ssh -o UserKnownHostsFile=`"$knownHosts`" -o StrictHostKeyChecking=yes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Git isolation setup complete for run $env:GITHUB_RUN_ID"
          Write-Host "  GIT_CONFIG_GLOBAL = $gitConfig"
          Write-Host "  GIT_SSH_COMMAND   = ssh -o UserKnownHostsFile=`"$knownHosts`" -o StrictHostKeyChecking=yes"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          clean: true

      - name: Add Private Parsers
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}
          go-cache: false

      - name: Add MinGW gcc to PATH
        shell: pwsh
        run: |
          $gccBin = "C:\msys64\mingw64\bin"
          if (!(Test-Path "$gccBin\gcc.exe")) { throw "gcc.exe not found at $gccBin" }
          echo $gccBin >> $env:GITHUB_PATH
          $env:Path = "$gccBin;$env:Path"
          where.exe gcc
          gcc --version


      - name: CGO toolchain sanity
        shell: pwsh
        run: |
          Write-Host "PATH=$env:PATH"
          where.exe gcc
          gcc --version
          go env CGO_ENABLED CC CXX GOOS GOARCH


      - name: Build Keploy (PR) - Windows (windows/amd64)
        shell: powershell
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "1"
          go build -tags=viper_bind_struct -ldflags="-X main.version=${{ github.sha }}" -o keploy.exe ./main.go

      - name: Upload build artifact (Windows CLI)
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: keploy.exe

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"

  docker-image-build:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Private Parsers
        uses: ./.github/actions/setup-private-parsers
        with:
          ssh-private-key: ${{ secrets.INTEGRATIONS_REPO_DEPLOY_KEY_PRIVATE }}
          go-cache: false

      - name: Set PR image tag
        run: echo "PR_IMAGE_TAG=ttl.sh/keploy/keploy:${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image for PR
        run: |
          bash ./.github/workflows/test_workflow_scripts/update-docker-ci.sh linux/amd64

      - name: Make unique tag for this run
        id: tag
        run: |
          IMAGE_TAG="ttl.sh/keploy/keploy:${GITHUB_SHA}-1h"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          docker image inspect ttl.sh/keploy/keploy:1h > /dev/null
          docker tag ttl.sh/keploy/keploy:1h "$IMAGE_TAG"

      - name: Push unique tag
        run: |
          docker push "${{ steps.tag.outputs.image_tag }}"

  pull-docker-image:
    needs: [docker-image-build]
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: [self-hosted, Windows, X64]

    steps:
      # Checkout first (HTTPS-based, doesn't need isolation), then
      # call the reusable script for git/SSH isolation.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup per-run git isolation
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\setup-git-isolation.ps1"

      - name: Ensure Docker is running
        shell: powershell
        run: |
          $script = Join-Path $Env:GITHUB_WORKSPACE '.github/scripts/windows/ensure-docker.ps1'
          if (Test-Path $script) { & $script } else { Write-Error "Required helper script not found: $script"; exit 1 }

      - name: Wait for Docker to be ready
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
            $attempt++
            try {
              $result = docker info 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Docker is ready after $attempt attempts"
                break
              }
            } catch {}
            Write-Host "Waiting for Docker... attempt $attempt/$maxAttempts"
            Start-Sleep -Seconds 2
          }
          if ($attempt -eq $maxAttempts) {
            Write-Error "Docker did not become ready in time"
            exit 1
          }

      - name: Pull Docker image
        shell: powershell
        run: |
          docker pull ${{ needs.docker-image-build.outputs.image_tag }}

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"

  run_golang_docker_windows:
    needs: [build-and-upload, docker-image-build, pull-docker-image]
    uses: ./.github/workflows/golang_docker_windows.yml
    with:
      image_tag: ${{ needs.docker-image-build.outputs.image_tag }}

  run_golang_native_windows:
    needs: [build-and-upload]
    uses: ./.github/workflows/golang_native_windows.yml

  cleanup:
    if: ${{ always() && ((github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    runs-on: [self-hosted, Windows, X64]
    needs: [run_golang_docker_windows, run_golang_native_windows]
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup per-run git isolation
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\setup-git-isolation.ps1"

      - name: Remove workflow start lock
        shell: powershell
        run: |
          $lockDir = Join-Path $env:USERPROFILE '.github-workflow-locks'
          $lockPath = Join-Path $lockDir "prepare-windows-workflow-$($env:GITHUB_RUN_ID).lock"
          Remove-Item -Path $lockPath -Force -ErrorAction SilentlyContinue

      - name: Check and cleanup long-running containers (Windows helper)
        id: count_stash
        continue-on-error: true
        shell: powershell
        run: |
          $script = Join-Path $Env:GITHUB_WORKSPACE '.github/scripts/windows/cleanup-windows.ps1'
          if (Test-Path $script) {
            & $script
          } else {
            Write-Error "Cleanup script not found at $script"
            exit 1
          }

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"

  gate:
    name: CI Gate (Windows)
    if: always()
    needs:
      - build-and-upload
      - docker-image-build
      - pull-docker-image
      - run_golang_docker_windows
      - run_golang_native_windows
      - cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results=( \
            "${{ needs.build-and-upload.result }}" \
            "${{ needs.docker-image-build.result }}" \
            "${{ needs.pull-docker-image.result }}" \
            "${{ needs.run_golang_docker_windows.result }}" \
            "${{ needs.run_golang_native_windows.result }}" \
            "${{ needs.cleanup.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more upstream jobs failed or were cancelled. Re-run all jobs, not individual ones."
              exit 1
            fi
          done
          echo "All jobs passed."
