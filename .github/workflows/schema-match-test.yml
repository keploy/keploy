name: Schema-Match-Test

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  schema-match-test:
    name: Schema Match E2E Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build Keploy
        run: |
          go build -tags=viper_bind_struct -o keploy .
          sudo mv keploy /usr/local/bin/keploy

      - name: Clone Sample App
        run: |
          git clone -b python-schema-match https://github.com/keploy/samples-python.git sample-app

      - name: Record Test Cases
        working-directory: sample-app/python-schema-match
        run: |
          sudo keploy record -c "python3 app.py" &
          KEPLOY_PID=$!
          sleep 5
          python3 check-endpoints.py
          sleep 5
          sudo kill $KEPLOY_PID || true
          echo "=== Recorded Data ==="
          ls -R keploy/

      - name: Run Schema Match Test
        working-directory: sample-app/python-schema-match
        run: |
          set +e
          OUTPUT=$(sudo keploy test -c "python3 app-test.py" --schema-match --delay 5 2>&1)
          set -e
          echo "$OUTPUT"
          PASS_COUNT=$(echo "$OUTPUT" | grep -c "Testrun passed" || true)
          FAIL_COUNT=$(echo "$OUTPUT" | grep -c "Testrun failed" || true)
          echo "------------------------------------------------"
          echo "Results: $PASS_COUNT PASSED, $FAIL_COUNT FAILED"
          echo "Expected: 7 PASSED, 3 FAILED"
          echo "------------------------------------------------"
          if [ "$PASS_COUNT" -eq 7 ] && [ "$FAIL_COUNT" -eq 3 ]; then
            echo "✅ SUCCESS: Schema match logic is correct."
            exit 0
          else
            echo "❌ FAILURE: Unexpected test results."
            exit 1
          fi