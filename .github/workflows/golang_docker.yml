name: Golang On Docker
on:
  workflow_call:
jobs:
  golang_docker:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: gin-mongo
            path: gin-mongo
            script_dir: gin_mongo
          - name: echo-sql
            path: echo-sql
            script_dir: echo_sql
          - name: go-memory-load
            path: go-memory-load
            script_dir: go_memory_load
          - name: go-memory-load-mysql
            path: go-memory-load-mysql
            script_dir: go_memory_load_mysql
          - name: go-memory-load-mongo
            path: go-memory-load-mongo
            script_dir: go_memory_load_mongo
          - name: go-memory-load-grpc
            path: go-memory-load-grpc
            script_dir: go_memory_load_grpc
          - name: proxy-stress-test
            path: proxy-stress-test
            script_dir: proxy_stress_test
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: image
        uses: ./.github/actions/download-image
        with:
          artifact_name: docker-image-linux-amd64

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}

      - name: Checkout the samples-go repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          ref: feat/all-memory-load-apps
          path: samples-go
      - name: Run ${{ matrix.app.name }} application
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          # RCA instrumentation for postgres-v3 per-test window misalignment
          # (see PR #4126). Only echo-sql is postgres-touching in this matrix;
          # the env var is a no-op for the non-PG apps so we set it
          # unconditionally and gate the artifact upload below.
          KEPLOY_PG_V3_LOG_BIND_VALUES: "1"
        run: |
          cd samples-go/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/golang/${{ matrix.app.script_dir }}/golang-docker.sh

      - name: Upload ${{ matrix.app.name }} recorded mocks and replay logs
        if: ${{ always() && (matrix.app.name == 'echo-sql' || matrix.app.name == 'go-memory-load-mongo' || matrix.app.name == 'go-memory-load-mysql') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-${{ matrix.config.job }}-recordings
          path: |
            samples-go/${{ matrix.app.path }}/keploy/
            samples-go/${{ matrix.app.path }}/record.txt
            samples-go/${{ matrix.app.path }}/test.txt
          if-no-files-found: warn
          retention-days: 7
