name: Python On Linux
on:
  workflow_call:
    inputs:
      runner:
        description: 'The type of runner to use for this job'
        type: string
        required: false
        default: 'ubuntu-latest'
      jobs_to_run:
        description: 'Controls which jobs to run. "all" runs everything.'
        type: string
        required: false
        default: 'all'
jobs:
  python_linux:
    if: ${{ inputs.jobs_to_run == 'all' }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: flask-secret
            path: flask-secret
            script_dir: flask-secret
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          repository: keploy/keploy

      - name: Checkout the samples-python repository
        uses: actions/checkout@v4.2.2
        with:
          repository: keploy/samples-python
          path: samples-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: samples-python/${{ matrix.app.path }}/requirements.txt

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}
      - name: Run the ${{ matrix.app.name }} application
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
        run: |
          cd samples-python/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/python/${{ matrix.app.script_dir }}/python-linux.sh

      # TODO(postgres-v3 RCA): flask-secret is not postgres-touching, so
      # KEPLOY_PG_V3_LOG_BIND_VALUES + recordings upload are intentionally
      # skipped here. See django-postgres job below for the instrumented
      # template; mirror it here only if flask-secret regresses on PG.

  python_linux_private:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: django-postgres
            path: django-postgres/django_postgres
            script_dir: django_postgres
        config:
          - job: record_latest_replay_build
            record_src: latest
            replay_src: build
          - job: record_build_replay_latest
            record_src: build
            replay_src: latest
          - job: record_build_replay_build
            record_src: build
            replay_src: build
    name: ${{ matrix.app.name }} (${{ matrix.config.job }})
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          repository: keploy/keploy

      - name: Checkout the samples-python repository
        uses: actions/checkout@v4.2.2
        with:
          repository: keploy/samples-python
          path: samples-python
          ref: native-linux

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: samples-python/${{ matrix.app.path }}/requirements.txt

      - name: Setup docker-compose
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.33.1/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
          docker compose version

      - name: Install necessary dependencies
        run: |
          sudo apt-get install -y build-essential gcc python3-dev libpq-dev pkg-config

      - id: record
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.record_src }}

      - id: replay
        uses: ./.github/actions/download-binary
        with:
          src: ${{ matrix.config.replay_src }}
      - name: Run the ${{ matrix.app.name }} application
        env:
          RECORD_BIN: ${{ steps.record.outputs.path }}
          REPLAY_BIN: ${{ steps.replay.outputs.path }}
          # RCA instrumentation for postgres-v3 per-test window misalignment
          # (see PR #4126). Logs live PG bind values on replay matcher misses
          # so the uploaded recordings can be cross-checked offline.
          KEPLOY_PG_V3_LOG_BIND_VALUES: "1"
        run: |
          cd samples-python/${{ matrix.app.path }}
          source $GITHUB_WORKSPACE/.github/workflows/test_workflow_scripts/python/${{ matrix.app.script_dir }}/python-linux.sh

      - name: Upload ${{ matrix.app.name }} recorded mocks and replay logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-${{ matrix.config.job }}-recordings
          path: |
            samples-python/${{ matrix.app.path }}/keploy/
            samples-python/${{ matrix.app.path }}/test_logs.txt
            samples-python/${{ matrix.app.path }}/*App_*.txt
          if-no-files-found: warn
          retention-days: 7
