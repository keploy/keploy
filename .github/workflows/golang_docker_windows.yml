name: Golang On Docker (Windows)
on:
  workflow_call:

concurrency:
  group: windows-docker-runner
  cancel-in-progress: false

jobs:
  golang_docker_windows:
    runs-on: [self-hosted, Windows, X64]
    # Same hung-FFI-shutdown rationale as golang_native_windows -
    # cap per-job wall-clock at 30 min so a stuck intercepted
    # process cannot hold a self-hosted Windows runner for 6h.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: go-http-no-deps
            path: go-dedup
            script_dir: go-dedup
        config:
          - job: record_build_replay_build
            record_src: build-windows
            replay_src: build-windows

    name: ${{ matrix.app.name }} (${{ matrix.config.job }}) (Windows)
    steps:
      # Remove stale SSH redirects from global config before checkout
      # so actions/checkout uses HTTPS, not SSH.
      # Create a minimal per-run gitconfig BEFORE checkout to prevent
      # concurrent jobs' SSH redirects from leaking into our checkout.
      - name: Pre-checkout git isolation
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          $isoDir = Join-Path (Join-Path $env:USERPROFILE ".git-isolation") $env:GITHUB_RUN_ID
          New-Item -Path $isoDir -ItemType Directory -Force | Out-Null
          $gitConfig = Join-Path $isoDir 'gitconfig'
          New-Item -Path $gitConfig -ItemType File -Force | Out-Null
          git config --file $gitConfig core.autocrlf false
          git config --file $gitConfig core.eol lf
          "GIT_CONFIG_GLOBAL=$gitConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # If a prior run on this self-hosted runner left the workspace
      # populated with files but no .git directory, actions/checkout's
      # clean:true fails at "git config --local" with "not a git repository".
      # Wipe in that case so checkout starts fresh; healthy workspaces are
      # left alone.
      - name: Recover stale runner state
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"'
        run: |
          $ErrorActionPreference = 'Continue'
          try {
            Get-Process -Name 'keploy' -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Stopping leftover keploy.exe pid=$($_.Id)"
              try { $_ | Stop-Process -Force -ErrorAction SilentlyContinue } catch {}
            }
            foreach ($name in @('WinDivert', 'WinDivert64')) {
              $svc = Get-Service -Name $name -ErrorAction SilentlyContinue
              if ($svc -and $svc.Status -ne 'Stopped') {
                Write-Host "Stopping kernel driver service $name (status=$($svc.Status))"
                try { Stop-Service -Name $name -Force -ErrorAction SilentlyContinue } catch {}
              }
            }
            $ws = $env:GITHUB_WORKSPACE
            if ($ws -and (Test-Path $ws)) {
              $gitDir = Join-Path $ws '.git'
              $items = @(Get-ChildItem -Path $ws -Force -ErrorAction SilentlyContinue)
              $hasFiles = $items.Count -gt 0
              if ($hasFiles -and -not (Test-Path $gitDir)) {
                Write-Host "::warning::Workspace $ws has files but no .git -- wiping for fresh checkout (prior run was interrupted)"
                Remove-Item -Path (Join-Path $ws '*') -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
          } catch {
            Write-Host "::warning::Recover stale runner state: $_"
          }
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup per-run git isolation
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"' 
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\setup-git-isolation.ps1"

      # --- CLI binaries (same as before) ---
      - name: Download Record Binary (${{ matrix.config.record_src }})
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.config.record_src }}
          path: record-bin

      - name: Install Record Binary
        id: setup_record
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"' 
        run: |
          New-Item -Path "./bin" -ItemType Directory -Force | Out-Null
          Move-Item -Path ".\record-bin\keploy.exe" -Destination ".\bin\keploy-record.exe" -Force
          echo "$env:GITHUB_WORKSPACE/bin" >> $env:GITHUB_PATH
          echo "bin_name=keploy-record.exe" >> $env:GITHUB_OUTPUT

      - name: Download Replay Binary (${{ matrix.config.replay_src }})
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.config.replay_src }}
          path: replay-bin

      - name: Install Replay Binary
        id: setup_replay
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"' 
        run: |
          New-Item -Path "./bin" -ItemType Directory -Force | Out-Null
          Move-Item -Path ".\replay-bin\keploy.exe" -Destination ".\bin\keploy-replay.exe" -Force
          echo "bin_name=keploy-replay.exe" >> $env:GITHUB_OUTPUT

      - id: image
        uses: ./.github/actions/download-image
        with:
          artifact_name: docker-image-linux-amd64
          version: ${{ github.sha }}

      - name: Checkout the samples-go repository
        uses: actions/checkout@v4
        with:
          repository: keploy/samples-go
          path: samples-go
          clean: true

      # Your existing run step
      - name: Run ${{ matrix.app.name }} application (Windows)
        env:
          RECORD_BIN:  ${{ steps.setup_record.outputs.bin_name }}
          REPLAY_BIN:  ${{ steps.setup_replay.outputs.bin_name }}
          # DOCKER_IMAGE_RECORD: ${{ steps.record_img.outputs.image }}
          # DOCKER_IMAGE_REPLAY: ${{ steps.replay_img.outputs.image }}
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"' 
        run: |
          cd samples-go/${{ matrix.app.path }}
          & "$env:GITHUB_WORKSPACE\.github\workflows\test_workflow_scripts\golang\${{ matrix.app.script_dir }}\golang-docker-windows.ps1"

      - name: Prune stale git isolation dirs
        if: always()
        continue-on-error: true
        shell: 'powershell -ExecutionPolicy Bypass -NoLogo -NoProfile -Command ". ''{0}''"' 
        run: |
          & "$env:GITHUB_WORKSPACE\.github\scripts\windows\cleanup-git-isolation.ps1"
