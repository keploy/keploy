name: pull-image
description: "Download a docker image tarball from a workflow artifact and load it into the local docker daemon."

inputs:
  artifact_name:
    description: "Name of the workflow artifact that holds image.tar (e.g. docker-image-linux-amd64)."
    required: false
    default: docker-image-linux-amd64
  version:
    description: "Version string to tag the loaded image with (ghcr.io/keploy/keploy:v<version>)."
    required: false
    default: 3-dev

runs:
  using: composite
  steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ runner.temp }}/keploy-image

    - name: Load image (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        TAR="${{ runner.temp }}/keploy-image/image.tar"
        if [ ! -f "$TAR" ]; then
          echo "::error::expected image tarball at $TAR"
          ls -la "${{ runner.temp }}/keploy-image" || true
          exit 1
        fi
        echo "Loading image from $TAR ..."
        # Run docker load exactly once: a second invocation for the
        # diagnostic path would re-import the image and (piped through
        # `head` under pipefail) risks SIGPIPE aborting the step
        # before the ::error:: line is emitted. Capture stdout+stderr
        # in one go and reuse the buffer for both parsing and
        # diagnostics.
        if ! LOAD_OUTPUT=$(docker load -i "$TAR" 2>&1); then
          LOAD_OUTPUT_ONE_LINE=$(printf '%s' "$LOAD_OUTPUT" | tr '\n' '; ')
          echo "::error::docker load failed for $TAR: $LOAD_OUTPUT_ONE_LINE"
          exit 1
        fi
        # Anchor to "Loaded image: " (with the trailing space) so the
        # `Loaded image ID: sha256:…` variant emitted when the tarball
        # has no RepoTags doesn't match and silently yield `sha256` as
        # the tag target. NR==1 + exit keeps selection deterministic
        # without a `head -n1` pipeline.
        LOADED=$(printf '%s\n' "$LOAD_OUTPUT" | awk -F'Loaded image: ' '/^Loaded image: / && NR==1 {print $2; exit}')
        if [ -z "$LOADED" ]; then
          LOAD_OUTPUT_ONE_LINE=$(printf '%s' "$LOAD_OUTPUT" | tr '\n' '; ')
          echo "::error::docker load completed but did not report a tagged image (tarball may be missing RepoTags): $LOAD_OUTPUT_ONE_LINE"
          exit 1
        fi
        echo "Loaded: $LOADED"
        docker tag "$LOADED" "ghcr.io/keploy/keploy:v${{ inputs.version }}"
        docker images | awk 'NR==1 || /keploy\/keploy/ {print}'
        echo "Image architecture:"
        docker image inspect "$LOADED" --format '{{.Os}}/{{.Architecture}}' || true

    - name: Load image (Windows)
      if: runner.os == 'Windows'
      # Use Windows PowerShell 5.1 (always preinstalled on Windows
      # runners) rather than pwsh (PowerShell 7, which not every
      # self-hosted runner in the fleet ships — see the Bootstrap
      # PowerShell environment step in prepare_and_run.yml's
      # build-windows-amd64 job, which repairs *that* job but does
      # not run in the pull-docker-image-windows job that invokes
      # this action). Every cmdlet used below (Join-Path, Test-Path,
      # Get-ChildItem, Select-String, [Environment]::NewLine,
      # string .Trim(), [string]::IsNullOrWhiteSpace) is 5.1-
      # compatible, so keeping the floor at 5.1 is free and avoids
      # a 'pwsh: command not found' step failure on unrepaired
      # runners.
      shell: powershell
      run: |
        $ErrorActionPreference = 'Stop'
        $tar = Join-Path "${{ runner.temp }}" "keploy-image\image.tar"
        if (-not (Test-Path $tar)) {
          Write-Error "expected image tarball at $tar"
          Get-ChildItem (Join-Path "${{ runner.temp }}" "keploy-image") -Force -ErrorAction SilentlyContinue
          exit 1
        }
        Write-Host "Loading image from $tar ..."
        $loadOutput = docker load -i $tar
        # Anchor at line start and trim the capture — docker CLI on
        # Windows emits CRLF, which `(.+)$` would swallow into the
        # capture group, yielding a trailing \r that makes
        # `docker tag` reject the reference. Trim() strips both CR
        # and any trailing whitespace.
        $match = $loadOutput | Select-String -Pattern '^Loaded image:\s+(.+)$' | Select-Object -First 1
        if ($null -eq $match) {
          Write-Error "docker load did not report a tagged image. Output: $($loadOutput -join [Environment]::NewLine)"
          exit 1
        }
        $loaded = $match.Matches.Groups[1].Value.Trim()
        if ([string]::IsNullOrWhiteSpace($loaded)) {
          Write-Error "docker load reported an empty image reference. Output: $($loadOutput -join [Environment]::NewLine)"
          exit 1
        }
        Write-Host "Loaded: $loaded"
        docker tag $loaded "ghcr.io/keploy/keploy:v${{ inputs.version }}"
        docker images --format "{{.Repository}}:{{.Tag}}" | Select-String -Pattern "keploy/keploy" -SimpleMatch
