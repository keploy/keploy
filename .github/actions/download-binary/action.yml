name: get-binary
description: "Download build or latest Keploy and expose its absolute path"

inputs:
  src:
    required: true
    # This action only handles Unix-style artifacts — the `chmod +x`
    # step below assumes the artifact contains a `keploy` binary (no
    # `.exe`). Windows consumers (golang_docker_windows.yml,
    # golang_native_windows.yml) call actions/download-artifact@v4
    # directly and handle `keploy.exe` in powershell themselves.
    description: "Name of a Unix-style binary artifact whose contents include a `keploy` binary (e.g. build, build-no-race, build-darwin, latest). Do NOT use this for Windows artifacts (which contain `keploy.exe`)."

outputs:
  path:
    description: "binary path"
    value: ${{ steps.set-path.outputs.path }}

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.src }}
        path: ${{ inputs.src }}

    - name: Set binary path
      id: set-path
      shell: bash
      run: |
        ls -l
        chmod +x ${{ inputs.src }}/keploy
        echo "path=$PWD/${{ inputs.src }}/keploy" >> $GITHUB_OUTPUT
